[platformio]
default_envs = esp32s3

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

lib_deps =
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.3
    bblanchon/ArduinoJson@^7.4.2
    arduino-libraries/NTPClient@^3.2.1

; ---------------------------------------------------------------------------
; Active target: ESP32-S3 N16R8 (native USB HID + USB CDC)
; ---------------------------------------------------------------------------
[env:esp32s3]
board = esp32-s3-devkitc-1
build_flags =
    -D VAULTKEY_ENABLE_USB_HID=1

; ---------------------------------------------------------------------------
; Legacy target: ESP32 DevKit V1 (no native USB HID)
; ---------------------------------------------------------------------------
; [env:esp32dev]
; board = esp32dev

; ---------------------------------------------------------------------------
; Optional target: ESP32-S2 (native USB). If you ever switch to S2, enable
; this env and set `default_envs = esp32s2` above.
; ---------------------------------------------------------------------------
; [env:esp32s2]
; board = esp32-s2-saola-1
; build_flags =
;     -D VAULTKEY_ENABLE_USB_HID=1
;     -D ARDUINO_USB_MODE=1
;     -D ARDUINO_USB_CDC_ON_BOOT=1
